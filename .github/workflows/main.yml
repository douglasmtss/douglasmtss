name: Generate Datas

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      # Snake Animation
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: douglasmtss
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Ensure dist directory exists
        run: mkdir -p dist

      # Trophies SVG cache
      - name: Download trophies SVG
        run: |
          curl -sSf "https://github-profile-trophy.vercel.app/?username=douglasmtss&theme=darkhub&no-frame=true&margin-w=4&column=6" \
            -o dist/trophies.svg \
            --retry 3 --retry-delay 5 \
            || echo "Trophy service unavailable, skipping"

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
