name: Generate Datas

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Snake Animation
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: douglasmtss
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Ensure dist directory exists
        run: mkdir -p dist

      # Trophies SVG cache
      - name: Download trophies SVG
        run: |
          mkdir -p dist
          TROPHY_URL="https://github-profile-trophy.vercel.app/?username=douglasmtss&theme=darkhub&no-frame=true&margin-w=4&column=6"
          if curl -sSf "$TROPHY_URL" -o /tmp/trophies_new.svg --retry 3 --retry-delay 5 && grep -q "<svg" /tmp/trophies_new.svg; then
            cp /tmp/trophies_new.svg dist/trophies.svg
            echo "Trophy SVG downloaded successfully"
          else
            echo "Trophy service unavailable, fetching cached version from output branch"
            git fetch origin output 2>/dev/null && \
              git show origin/output:trophies.svg > dist/trophies.svg 2>/dev/null && \
              echo "Cached version restored" || echo "No cached version available"
          fi

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
